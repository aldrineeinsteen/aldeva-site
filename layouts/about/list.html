{{ define "main" }}
<section class="max-w-5xl mx-auto px-4 py-10">
  <div class="mb-8 rounded-3xl border border-neutral-200 dark:border-neutral-700 p-6 md:p-8 bg-cover bg-center" style="background-image: linear-gradient(rgba(15, 23, 42, 0.35), rgba(15, 23, 42, 0.2)), url('/images/photos/open-1.jpg');">
    <div class="flex items-center justify-between gap-4">
      <div class="text-white">
        <h1 class="text-3xl md:text-4xl font-semibold tracking-tight">{{ .Title }}</h1>
        {{ with .Description }}
          <p class="mt-2 text-base text-white/90">{{ . }}</p>
        {{ end }}
      </div>
      <img src="/images/logo.svg" alt="Ald Eva logo" class="hidden sm:block w-16 h-16 rounded-xl border border-neutral-200 dark:border-neutral-700 bg-white/75 dark:bg-neutral-900/75 p-1.5" />
    </div>
  </div>

  <div class="grid gap-5 md:grid-cols-2">
    {{ range .Pages.ByTitle }}
      <a href="{{ .RelPermalink }}" class="block rounded-2xl border border-neutral-200 dark:border-neutral-700 p-6 hover:border-neutral-300 dark:hover:border-neutral-500 transition-colors">
        <h2 class="text-xl font-medium">{{ .Title }}</h2>
        {{ with .Params.role }}
          <p class="mt-2 text-sm opacity-80">{{ . }}</p>
        {{ end }}
        {{ with .Params.summary }}
          <p class="mt-3 text-sm">{{ . }}</p>
        {{ end }}
      </a>
    {{ end }}
  </div>
</section>
{{ end }}
