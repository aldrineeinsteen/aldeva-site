{{ define "main" }}
<section class="max-w-5xl mx-auto px-4 py-10">
  <div class="mb-8 rounded-3xl border border-neutral-200 dark:border-neutral-700 p-6 md:p-8 bg-cover bg-center" style="background-image: linear-gradient(rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.25)), url('/images/photos/open-3.jpg');">
    <h1 class="text-3xl md:text-4xl font-semibold tracking-tight text-white">{{ .Title }}</h1>
    {{ with .Description }}
      <p class="mt-2 text-base text-white/90">{{ . }}</p>
    {{ end }}
    <div class="mt-4 prose dark:prose-invert max-w-none text-white [&_p]:text-white/90 [&_a]:text-white [&_li]:text-white/90">
      {{ .Content }}
    </div>
  </div>

  <div class="grid gap-4 md:grid-cols-2">
    {{ range .Pages.ByTitle }}
      <a href="{{ .RelPermalink }}" class="block rounded-2xl border border-neutral-200 dark:border-neutral-700 p-5 hover:border-neutral-300 dark:hover:border-neutral-500 transition-colors">
        <h2 class="text-lg font-medium">{{ .Title }}</h2>
        {{ with .Description }}
          <p class="mt-2 text-sm opacity-80">{{ . }}</p>
        {{ end }}
      </a>
    {{ end }}
  </div>

</section>
{{ end }}
